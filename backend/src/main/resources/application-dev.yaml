spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    properties:
      hibernate:
        format_sql: ${HIBERNATE_FORMAT_SQL:true}

  flyway:
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:true}

jwt:
  access-token-secret: ${JWT_ACCESS_TOKEN_SECRET:${JWT_SECRET}}
  refresh-token-secret: ${JWT_REFRESH_TOKEN_SECRET}
  refresh-token-hash-secret: ${JWT_REFRESH_TOKEN_HASH_SECRET:${JWT_REFRESH_TOKEN_SECRET}}

logging:
  level:
    backend.xxx.chat.common.logging.LoggingAspect: DEBUG
