spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/chat_app}
    username: ${DB_USERNAME:chat_user}
    password: ${DB_PASSWORD:change_me_db_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: ${HIBERNATE_FORMAT_SQL:true}

jwt:
  access-token-secret: ${JWT_ACCESS_TOKEN_SECRET:${JWT_SECRET:dev-only-access-token-secret-change-before-production}}
  refresh-token-secret: ${JWT_REFRESH_TOKEN_SECRET:dev-only-refresh-token-secret-change-before-production}
