spring:
  application:
    name: chat
  profiles:
    default: ${SPRING_PROFILES_ACTIVE:dev}

  data:
    redis:
      repositories:
        enabled: false

  jpa:
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}

jwt:
  access-token-secret: ${JWT_ACCESS_TOKEN_SECRET}
  refresh-token-secret: ${JWT_REFRESH_TOKEN_SECRET}
  refresh-token-hash-secret: ${JWT_REFRESH_TOKEN_HASH_SECRET}
  access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS}
  refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_MS}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  storage:
    r2:
      enabled: ${R2_ENABLED:false}
      account-id: ${R2_ACCOUNT_ID:}
      access-key-id: ${R2_ACCESS_KEY_ID:}
      secret-access-key: ${R2_SECRET_ACCESS_KEY:}
      bucket: ${R2_BUCKET:}
      public-base-url: ${R2_PUBLIC_BASE_URL:}
      presigned-upload-ttl: ${R2_PRESIGNED_UPLOAD_TTL:10m}
      max-file-size-bytes: ${R2_MAX_FILE_SIZE_BYTES:26214400}
      allowed-content-types: ${R2_ALLOWED_CONTENT_TYPES:image/jpeg,image/png,image/webp,image/gif,video/mp4,video/webm,audio/mpeg,audio/ogg,application/pdf,text/plain,application/zip}

springdoc:
  paths-to-match: /api/v1/**
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
