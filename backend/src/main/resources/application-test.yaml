spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:chat_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true

jwt:
  access-token-secret: test-only-access-token-secret-at-least-32-characters
  refresh-token-secret: test-only-refresh-token-secret-at-least-32-characters
  refresh-token-hash-secret: test-only-refresh-token-hash-secret-at-least-32-characters
  access-token-expiration-ms: 900000
  refresh-token-expiration-ms: 604800000

app:
  cors:
    allowed-origins: http://localhost:5173
