spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:chat_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: false

jwt:
  access-token-secret: test-only-access-token-secret-at-least-32-characters
  refresh-token-secret: test-only-refresh-token-secret-at-least-32-characters
